apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-container
        image: payment:v1
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: db_host
        - name: DB_PORT
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: db_port
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: db_user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: db_password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: db_name
